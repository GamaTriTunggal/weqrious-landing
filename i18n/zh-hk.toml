[faq_title]
other = "常見問題"
[faq1_q]
other = "我們可以多快將 WEQRIOUS 部署於產品上？"
[faq1_a]
other = "大部分品牌於一星期內上線。註冊、建立產品、生成二維碼及印刷即可。毋須硬件安裝或開發應用程式——消費者使用任何智能手機相機均可掃描。"
[faq2_q]
other = "平台能否依照我們的品牌識別進行客製化？"
[faq2_a]
other = "完全可以。每一個面向消費者的頁面——驗證、保養、推廣——均會以您的標誌、顏色與影像呈現白標設計。您可建立多套模板並排程季節性主題。"
[faq3_q]
other = "在沒有專用硬件的情況下，冒牌偵測如何運作？"
[faq3_a]
other = "WEQRIOUS 採用智能軟件式偵測。每個二維碼均為獨一無二且可追蹤。系統會標記過量掃描、不可能之位移模式（同一二維碼於數分鐘內出現在相距甚遠的兩個城市），以及產品出現在授權範圍之外等異常情況。"
[faq4_q]
other = "我們的數據是否安全？"
[faq4_a]
other = "安全貫穿各層。我們採用以 JWT 為基礎的身份驗證並配搭 HttpOnly Cookie，資料以租戶隔離架構存放，並提供完整審計記錄；基礎設施按照業界最佳實務加固。您的資料絕不會於租戶之間共享。"


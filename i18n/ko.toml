[faq_title]
other = "자주 묻는 질문"
[faq1_q]
other = "WEQRIOUS를 당사 제품에 얼마나 빨리 도입할 수 있습니까?"
[faq1_a]
other = "대부분의 브랜드는 일주일 이내에 런칭합니다. 가입, 제품 생성, QR 코드 생성, 인쇄만으로 충분합니다. 하드웨어 설치나 앱 개발이 필요 없으며, 소비자는 일반 스마트폰 카메라로 스캔합니다."
[faq2_q]
other = "플랫폼을 당사 브랜드 아이덴티티에 맞추어 커스터마이즈할 수 있습니까?"
[faq2_a]
other = "완전히 가능합니다. 검증, 보증, 캠페인 등 소비자를 접하는 모든 페이지는 귀사의 로고, 색상, 이미지로 화이트 라벨 처리됩니다. 다수의 템플릿을 만들고 시즌별 테마를 예약할 수 있습니다."
[faq3_q]
other = "전용 하드웨어 없이 위조 탐지가 어떻게 가능합니까?"
[faq3_a]
other = "WEQRIOUS는 지능형 소프트웨어 기반 탐지를 사용합니다. 모든 QR 코드는 고유하며 추적됩니다. 과도한 스캔, 불가능한 이동 패턴(동일 코드가 수 분 내에 서로 멀리 떨어진 두 도시에서 스캔됨), 승인된 유통 구역 외에 제품이 등장하는 등의 이상 징후를 시스템이 자동으로 플래그합니다."
[faq4_q]
other = "데이터는 안전합니까?"
[faq4_a]
other = "보안은 모든 계층에 내장되어 있습니다. HttpOnly 쿠키를 사용하는 JWT 기반 인증, 테넌트별 데이터 격리 아키텍처, 전체 감사 로깅, 업계 모범 사례에 따른 인프라 강화로 보호합니다. 귀사의 데이터는 다른 테넌트와 공유되지 않습니다."

[contact_title]
other = "제품을 보호하고 고객과 연결할 준비가 되셨습니까?"
[contact_subtitle]
other = "위조 대응, 소비자 참여 확대, 실시간 제품 인텔리전스 확보를 위해 WEQRIOUS를 신뢰하는 동남아시아 전역의 브랜드들과 함께하십시오."


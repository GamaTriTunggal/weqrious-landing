[hero_title]
other = "위조로 인한 피해가 발생하기 전에 차단하십시오."
[hero_subtitle]
other = "QR 코드를 강력한 위조 방지 방패, 소비자 참여 채널, 그리고 비즈니스 인텔리전스 엔진으로 바꾸는 올인원 플랫폼입니다."
[hero_cta]
other = "문의하기"

[problems_title]
other = "위조는 매출을 갉아먹습니다. 수동형 라벨로는 막을 수 없습니다."
[problems_body1]
other = "글로벌 위조는 기업에 매년 5,000억 달러 이상의 매출 손실, 브랜드 훼손, 소비자 안전 리스크를 초래합니다. 기존의 홀로그램 스티커와 정적인 QR 코드는 실시간 인텔리전스를 제공하지 않으며, 위조품이 언제 등장했는지, 어디에서 스캔되었는지, 누가 스캔했는지 알 수 없습니다."
[problems_body2]
other = "더욱 문제는, 모든 제품 스캔이 놓친 기회라는 점입니다. 매일 수백만 명의 소비자가 브랜드의 패키지와 접촉하지만, 대부분의 브랜드는 그 순간으로부터 어떠한 데이터도 확보하지 못합니다."
[problems_body3]
other = "<strong>WEQRIOUS는 두 가지를 모두 바꿉니다.</strong> 모든 스캔을 검증 이벤트로, 모든 검증을 참여 기회로 전환하여, 하나의 플랫폼에서 보호와 통찰을 동시에 제공합니다."

[hiw_title]
other = "세 단계, 완전한 보호"
[hiw_step1_title]
other = "생성 및 인쇄"
[hiw_step1_desc]
other = "모든 제품 단위 또는 배치에 대해 고유한 QR 코드를 생성하십시오. 하나의 대시보드에서 검증 페이지, 보증 양식, 캠페인 경험을 구성할 수 있습니다. 전문 인쇄를 주문하거나 기존 생산 라인에 통합하십시오."
[hiw_step2_title]
other = "소비자가 스캔하여 검증"
[hiw_step2_desc]
other = "고객이 스마트폰 카메라로 QR 코드를 스캔하면 즉시 제품의 진위를 확인합니다. 귀사의 브랜드, 제품 세부 정보, 인증 배지가 함께 표시되며 앱 설치는 필요하지 않습니다."
[hiw_step3_title]
other = "참여, 보호, 분석"
[hiw_step3_desc]
other = "모든 스캔은 대시보드에 실시간 데이터를 전송합니다. 위치 히트맵, 위조 경보, 보증 등록, 캠페인 참여가 수집되며, 의심스러운 패턴은 자동으로 표시되어 신속히 대응할 수 있습니다."

[features_title]
other = "하나의 플랫폼에서 필요한 모든 것"
[feat1_title]
other = "제품 인증"
[feat1_desc]
other = "고객이 스캔합니다. 브랜드가 말합니다. 모든 QR 코드는 귀사의 색상, 로고, 톤으로 꾸며진 검증 페이지를 엽니다. 소비자는 자신이 손에 쥔 제품이 진품인지 즉시 확인할 수 있습니다."
[feat2_title]
other = "위조 탐지"
[feat2_desc]
other = "위조품은 스스로 모습을 드러내지 않습니다. 하지만 당사의 시스템은 스캔 패턴 분석, 지리적 이상 탐지, 유통 구역 모니터링을 통해 위조품을 포착합니다. 피해가 확산되기 전에 경보를 수신할 수 있습니다."
[feat3_title]
other = "캠페인 및 소비자 참여"
[feat3_desc]
other = "대부분의 브랜드는 구매 순간에 고객을 놓칩니다. WEQRIOUS를 사용하면 모든 스캔이 프로모션 실행, 피드백 수집, 로열티 구축의 기회가 되며, 패키지는 가장 활용되지 않던 마케팅 채널로 탈바꿈합니다."
[feat4_title]
other = "보증 관리"
[feat4_desc]
other = "소비자는 스캔으로 보증을 등록합니다. 청구는 귀사의 팀이 제어하는 구조화된 워크플로를 따라 진행되며, 스프레드시트나 분실 문서 없이 등록부터 처리까지 깔끔하게 진행됩니다."
[feat5_title]
other = "유통 추적"
[feat5_desc]
other = "제품이 어디에 있는지, 또 어디에 있어서는 안 되는지 정확히 파악하십시오. 유통망의 각 계층에서 재고를 추적하며, 제품이 승인되지 않은 지역에 등장할 경우 즉시 경보를 받습니다."
[feat6_title]
other = "애널리틱스 및 인사이트"
[feat6_desc]
other = "모든 스캔은 하나의 데이터 포인트입니다. 소비자의 위치, 참여 방식, 위협의 출현 지점을 하나의 대시보드에서 실시간 히트맵과 추세 분석으로 확인할 수 있습니다."


[highlights_title]
other = "엔터프라이즈 수준, 스타트업처럼 간단."
[hl1_title]
other = "귀사의 브랜드가 전면에 서도록"
[hl1_desc]
other = "고객이 접하는 모든 페이지는 당사가 아닌 귀사의 것으로 보입니다."
[hl2_title]
other = "수 분 내 런칭"
[hl2_desc]
other = "인프라 구축이 필요 없습니다. 가입하고 설정한 뒤 바로 운영하십시오. 워크스페이스는 첫날부터 완전히 격리되고 안전합니다."
[hl3_title]

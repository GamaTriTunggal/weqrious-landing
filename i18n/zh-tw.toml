[problems_title]
other = "仿冒正在蠶食營收，被動標籤已不敷使用。"
[problems_body1]
other = "全球仿冒每年造成企業超過 5,000 億美元的損失，涉及營收流失、品牌受損與消費者安全風險。傳統全像標籤與靜態 QR Code 無法提供即時情報——無法告訴您仿冒品何時出現、於何處被掃描、由誰掃描。"
[problems_body2]
other = "更糟的是，每一次產品掃描都是一次錯失的機會。每日數以百萬計的消費者接觸您的包裝，但大多數品牌從這些瞬間獲取到的資料幾乎為零。"
[problems_body3]
other = "<strong>WEQRIOUS 同時改寫兩者。</strong>我們將每次掃描轉為驗證事件，將每次驗證轉為互動契機——讓保護與洞察在同一平台完成。"

[hiw_title]
other = "三步到位，全面守護。"
[hiw_step1_title]
other = "產生與列印"
[hiw_step1_desc]
other = "為每件產品或每一批次產生專屬 QR Code。於同一個後台設定驗證頁面、保固表單與行銷體驗。可下單專業印刷，或與您既有的生產線整合。"
[hiw_step2_title]
other = "消費者掃碼驗證"
[hiw_step2_desc]
other = "消費者以任意智慧型手機相機掃描 QR Code，即刻判別產品真偽——呈現您的品牌風格、產品資訊與認證徽章，無須下載任何 App。"
[hiw_step3_title]
other = "互動、防護、分析"
[hiw_step3_desc]
other = "每一次掃描將即時資料推送至您的後台：位置熱圖、仿冒警示、保固登記與行銷參與。可疑模式自動標示，協助您迅速行動。"

[features_title]
other = "一站式平台，涵蓋所有需求"
[feat1_title]
other = "產品驗證"
[feat1_desc]
other = "消費者掃碼，品牌發聲。每一個 QR Code 開啟一個完整品牌化的驗證頁——以您的色彩、標誌與語氣——讓消費者得知手中產品是否為正品。"
[feat2_title]
other = "仿冒偵測"
[feat2_desc]
other = "仿冒品不會自行現身，我們的系統卻能察覺——透過掃描行為分析、地理異常偵測與通路區域監控。損害擴散之前，您便已接獲警示。"
[feat3_title]
other = "行銷活動與消費者互動"
[feat3_desc]
other = "多數品牌在消費者購買之際便失去聯繫。使用 WEQRIOUS，每次掃描皆是推動優惠、蒐集意見與培養忠誠度的機會——讓包裝成為您最未被善用的行銷通路。"
[feat4_title]
other = "保固管理"
[feat4_desc]
other = "消費者掃碼即可登錄保固，申訴依照您設定的結構化流程運作，不再有試算表、不再遺失文件——由登錄到結案，流程簡潔俐落。"
[feat5_title]
other = "通路追蹤"
[feat5_desc]
other = "精準掌握產品身在何處——以及不該出現的地方。於通路網絡的每個層級追蹤庫存，產品一旦現身於授權範圍之外，系統即時通報。"
[feat6_title]
other = "分析與洞察"
[feat6_desc]
other = "每次掃描都是一個資料點。了解消費者所在位置、互動方式與威脅浮現之處——一切集中在同一後台，搭配即時熱圖與趨勢分析。"


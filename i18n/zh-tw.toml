[faq_title]
other = "常見問題"
[faq1_q]
other = "我們能多快將 WEQRIOUS 部署至自家產品？"
[faq1_a]
other = "多數品牌於一週內上線。註冊、建立產品、產生 QR Code 並印製即可。無須硬體安裝或 App 開發——消費者以任何智慧型手機相機皆可掃描。"
[faq2_q]
other = "平台能否依照我們的品牌識別客製？"
[faq2_a]
other = "完全可以。每個面向消費者的頁面——驗證、保固、行銷——皆以您的標誌、色彩與影像呈現白牌化。您可以建立多個模板並安排季節性主題。"
[faq3_q]
other = "在沒有專用硬體的情況下，仿冒偵測如何運作？"
[faq3_a]
other = "WEQRIOUS 採用智慧型軟體偵測。每個 QR Code 皆為獨一且可追蹤。系統會標示異常情況——例如過量掃描、不可能的位移模式（同一 QR Code 於數分鐘內出現在相距甚遠的兩座城市），以及產品出現在授權通路之外。"
[faq4_q]
other = "我們的資料是否安全？"
[faq4_a]
other = "安全貫穿各層。我們採用以 JWT 為基礎的身份驗證並搭配 HttpOnly Cookie，資料以租戶隔離架構儲存，並提供完整稽核紀錄；基礎設施依業界最佳實務強化。您的資料絕不會於租戶之間共用。"


[faq_title]
other = "Soalan Lazim"
[faq1_q]
other = "Berapa pantas kami boleh melaksanakan WEQRIOUS untuk produk kami?"
[faq1_a]
other = "Kebanyakan jenama siap diguna pakai dalam tempoh seminggu. Daftar, cipta produk anda, jana kod QR, dan cetak. Tiada pemasangan perkakasan atau pembangunan aplikasi diperlukan — pengguna mengimbas dengan mana-mana kamera telefon pintar."
[faq2_q]
other = "Adakah platform ini boleh disuaikan dengan identiti jenama kami?"
[faq2_a]
other = "Sepenuhnya. Setiap halaman yang menghadap pengguna — pengesahan, waranti, kempen — berlabel putih dengan logo, warna, dan imej anda. Anda boleh mencipta berbilang templat dan menjadualkan tema bermusim."
[faq3_q]
other = "Bagaimana pengesanan pemalsuan berfungsi tanpa perkakasan khusus?"
[faq3_a]
other = "WEQRIOUS menggunakan pengesanan pintar berasaskan perisian. Setiap kod QR adalah unik dan dijejak. Sistem menandakan anomali seperti imbasan berlebihan, corak perjalanan mustahil (kod yang sama diimbas di dua bandar berjauhan dalam beberapa minit), dan produk yang muncul di luar zon pengedaran yang dibenarkan."
[faq4_q]
other = "Adakah data kami selamat?"
[faq4_a]
other = "Keselamatan dibina pada setiap lapisan. Kami menggunakan pengesahan berasaskan JWT dengan kuki HttpOnly, seni bina data berasingan mengikut tenant, pencatatan audit sepenuhnya, dan infrastruktur yang diperkukuh mengikut amalan terbaik industri. Data anda tidak pernah dikongsi antara tenant."


[problems_title]
other = "Pemalsuan Merosakkan Pendapatan. Label Pasif Tidak Mencukupi."
[problems_body1]
other = "Pemalsuan global mengakibatkan kerugian melebihi $500 bilion setahun dari segi pendapatan yang hilang, kerosakan jenama, dan risiko keselamatan pengguna. Pelekat hologram tradisional dan kod QR statik tidak memberikan perisikan masa nyata — tiada maklumat bila tiruan muncul, di mana ia diimbas, atau siapa yang mengimbasnya."
[problems_body2]
other = "Lebih teruk lagi, setiap imbasan produk adalah peluang yang terlepas. Jutaan pengguna berinteraksi dengan pembungkusan anda setiap hari, namun kebanyakan jenama tidak mengumpul sebarang data daripada momen tersebut."
[problems_body3]
other = "<strong>WEQRIOUS mengubah kedua-duanya.</strong> Kami menjadikan setiap imbasan sebagai peristiwa pengesahan, dan setiap pengesahan sebagai peluang penglibatan — memberikan anda perlindungan dan wawasan dalam satu platform."

[hiw_title]
other = "Tiga Langkah. Perlindungan Menyeluruh."
[hiw_step1_title]
other = "Jana & Cetak"
[hiw_step1_desc]
other = "Jana kod QR unik untuk setiap unit atau kelompok produk. Konfigurasikan halaman pengesahan, borang waranti, dan pengalaman kempen — semuanya dari satu papan pemuka. Tempah percetakan profesional atau integrasikan dengan barisan pengeluaran sedia ada anda."
[hiw_step2_title]
other = "Pengguna Mengimbas untuk Mengesahkan"
[hiw_step2_desc]
other = "Pelanggan mengimbas kod QR dengan kamera telefon pintar. Serta-merta, mereka mengetahui sama ada produk itu tulen — lengkap dengan jenama, butiran produk, dan lencana pensijilan anda. Tidak memerlukan muat turun aplikasi."
[hiw_step3_title]
other = "Libatkan, Lindungi, Analisa"
[hiw_step3_desc]
other = "Setiap imbasan mengalirkan data masa nyata ke papan pemuka anda: peta haba lokasi, amaran pemalsuan, pendaftaran waranti, dan penyertaan kempen. Corak mencurigakan ditandakan secara automatik supaya anda boleh bertindak pantas."

[features_title]
other = "Segala Keperluan Anda dalam Satu Platform"
[feat1_title]
other = "Pengesahan Produk"
[feat1_desc]
other = "Pelanggan anda mengimbas. Jenama anda bersuara. Setiap kod QR membuka halaman pengesahan berjenama sepenuhnya — dengan warna, logo, dan gaya suara anda — yang memberitahu pengguna sama ada produk di tangan mereka tulen."
[feat2_title]
other = "Pengesanan Pemalsuan"
[feat2_desc]
other = "Barang tiruan tidak akan mengumumkan dirinya. Sistem kami tetap mengesannya — melalui analisis corak imbasan, pengesanan anomali geografi, dan pemantauan zon pengedaran. Anda menerima amaran sebelum kerosakan merebak."
[feat3_title]
other = "Kempen & Penglibatan Pengguna"
[feat3_desc]
other = "Kebanyakan jenama kehilangan pelanggan sebaik sahaja pembelian selesai. Dengan WEQRIOUS, setiap imbasan adalah peluang untuk menjalankan promosi, mengumpul maklum balas, dan membina kesetiaan — menjadikan pembungkusan sebagai saluran pemasaran yang paling kurang digunakan."
[feat4_title]
other = "Pengurusan Waranti"
[feat4_desc]
other = "Pengguna mendaftar waranti dengan mengimbas. Tuntutan mengalir menerusi aliran kerja berstruktur yang dikawal oleh pasukan anda. Tiada lagi hamparan, tiada lagi dokumen hilang — hanya proses bersih dari pendaftaran hingga penyelesaian."
[feat5_title]
other = "Penjejakan Pengedaran"
[feat5_desc]
other = "Ketahui dengan tepat di mana produk anda berada — dan di mana ia tidak sepatutnya berada. Jejaki inventori di setiap peringkat rangkaian pengedaran, dan terima amaran apabila produk muncul di luar wilayah yang dibenarkan."
[feat6_title]
other = "Analitik & Wawasan"
[feat6_desc]
other = "Setiap imbasan adalah titik data. Lihat di mana pengguna anda berada, bagaimana mereka terlibat, dan di mana ancaman muncul — semuanya dalam satu papan pemuka dengan peta haba masa nyata dan analisis trend."


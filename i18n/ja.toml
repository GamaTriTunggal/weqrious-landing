[hero_title]
other = "損害が生じる前に、偽造品を止める。"
[hero_subtitle]
other = "QRコードを強力な偽造防止の盾、消費者エンゲージメントのチャネル、そしてビジネスインテリジェンスのエンジンへと変えるオールインワン・プラットフォームです。"
[hero_cta]
other = "お問い合わせ"

[problems_title]
other = "偽造は売上を蝕みます。受動的なラベルでは守りきれません。"
[problems_body1]
other = "世界の偽造被害は、売上損失、ブランド毀損、消費者の安全リスクにより年間5,000億ドルを超えています。従来のホログラムシールや静的なQRコードはリアルタイム情報を提供せず、偽物がいつ現れたか、どこでスキャンされたか、誰がスキャンしたかを把握できません。"
[problems_body2]
other = "さらに、あらゆる製品のスキャンは失われた機会でもあります。毎日数百万人の消費者が御社のパッケージに触れているにもかかわらず、多くのブランドはそこから何のデータも得ていないのが現状です。"
[problems_body3]
other = "<strong>WEQRIOUSは、この両方を変えます。</strong>すべてのスキャンを認証イベントに、すべての認証をエンゲージメントの機会に変換し、保護と洞察を単一のプラットフォームでご提供します。"

[hiw_title]
other = "3つのステップで、万全の保護。"
[hiw_step1_title]
other = "生成と印刷"
[hiw_step1_desc]
other = "各製品ユニットまたはバッチごとに固有のQRコードを生成します。検証ページ、保証フォーム、キャンペーン体験をひとつのダッシュボードから構成可能。プロフェッショナルな印刷を発注することも、既存の生産ラインに組み込むこともできます。"
[hiw_step2_title]
other = "消費者がスキャンして検証"
[hiw_step2_desc]
other = "お客様がスマートフォンのカメラでQRコードをスキャンすると、その瞬間に製品の真贋が判定されます。御社のブランディング、製品情報、認証バッジとともに表示され、アプリのダウンロードは不要です。"
[hiw_step3_title]
other = "エンゲージメント、保護、分析"
[hiw_step3_desc]
other = "各スキャンはダッシュボードにリアルタイムデータを送り込みます。位置ヒートマップ、偽造アラート、保証登録、キャンペーン参加が集約され、疑わしいパターンは自動的にフラグが立ち、迅速な対応を可能にします。"

[features_title]
other = "ひとつのプラットフォームに、必要なすべてを"
[feat1_title]
other = "製品認証"
[feat1_desc]
other = "消費者がスキャンし、ブランドが語ります。すべてのQRコードが御社の色、ロゴ、トーンを纏った完全ブランド化の検証ページを開き、手にしている製品が本物かどうかを消費者に伝えます。"
[feat2_title]
other = "偽造検出"
[feat2_desc]
other = "偽物は自ら名乗り出ません。しかし当社のシステムは、スキャンパターン分析、地理的異常検知、流通エリア監視を通じて偽物を捕捉します。被害が広がる前に警告を受け取ることができます。"
[feat3_title]
other = "キャンペーンと消費者エンゲージメント"
[feat3_desc]
other = "多くのブランドは購入の瞬間に顧客を失います。WEQRIOUSを用いれば、すべてのスキャンがプロモーション実施、フィードバック収集、ロイヤリティ構築の機会となり、パッケージは最も活用されていなかったマーケティングチャネルへと生まれ変わります。"
[feat4_title]
other = "保証管理"
[feat4_desc]
other = "消費者はスキャンで保証を登録します。請求は御社のチームが管理する構造化されたワークフローで処理され、スプレッドシートや紛失書類はもう不要です。登録から解決まで、明瞭なプロセスで運用できます。"
[feat5_title]
other = "流通追跡"
[feat5_desc]
other = "製品が今どこにあるか——そしてどこにあってはならないかを、正確に把握できます。流通網の各階層で在庫を追跡し、許可された地域外に製品が現れた際には直ちにアラートが発報されます。"
[feat6_title]
other = "アナリティクスとインサイト"
[feat6_desc]
other = "すべてのスキャンがデータポイントになります。消費者の所在、エンゲージメントの方法、脅威の出現箇所を、リアルタイムのヒートマップとトレンド分析を備えた単一ダッシュボードで俯瞰できます。"


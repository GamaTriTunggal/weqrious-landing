[faq_title]
other = "よくあるご質問"
[faq1_q]
other = "WEQRIOUSを自社製品にどれほど迅速に導入できますか？"
[faq1_a]
other = "ほとんどのブランドが1週間以内に稼働を開始します。アカウント登録、製品登録、QRコード生成、印刷のみで開始可能です。ハードウェアの設置やアプリ開発は不要で、消費者はスマートフォンのカメラで直接スキャンします。"
[faq2_q]
other = "プラットフォームを自社ブランドに合わせてカスタマイズできますか？"
[faq2_a]
other = "完全に可能です。検証、保証、キャンペーンといった消費者向けの全ページが、御社のロゴ、カラー、画像でホワイトラベル化されます。複数のテンプレートを作成し、季節ごとのテーマをスケジュールすることも可能です。"
[faq3_q]
other = "専用ハードウェアを使わずに偽造検出はどのように機能しますか？"
[faq3_a]
other = "WEQRIOUSはインテリジェントなソフトウェアベースの検出を採用しています。すべてのQRコードは一意であり追跡されます。過度なスキャン、移動不能なパターン（同一コードが数分以内に遠隔の2都市でスキャンされる等）、許可された流通エリア外で現れる製品といった異常を自動的にフラグ付けします。"
[faq4_q]
other = "当社のデータは安全ですか？"
[faq4_a]
other = "セキュリティはすべての層に組み込まれています。HttpOnly Cookieを用いたJWTベース認証、テナント分離されたデータアーキテクチャ、完全な監査ログ、業界のベストプラクティスに沿って堅牢化されたインフラを採用しています。御社のデータがテナント間で共有されることはありません。"


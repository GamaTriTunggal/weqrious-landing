# Problems
[problems_title]
other = "Counterfeiting Is a Revenue Killer. Passive Labels Won't Save You."
[problems_body1]
other = "Global counterfeiting costs businesses over $500 billion a year in lost revenue, brand damage, and consumer safety risks. Traditional hologram stickers and static QR codes offer no real-time intelligence — they can't tell you when a fake surfaces, where it was scanned, or who scanned it."
[problems_body2]
other = "Worse, every product scan is a missed opportunity. Millions of consumers interact with your packaging daily, yet most brands capture zero data from those moments."
[problems_body3]
other = "<strong>WEQRIOUS changes both.</strong> We turn every scan into a verification event and every verification into an engagement opportunity — giving you protection and insight in a single platform."

# How It Works
[hiw_title]
other = "Three Steps. Full Protection."
[hiw_step1_title]
other = "Generate & Print"
[hiw_step1_desc]
other = "Create unique QR codes for every product unit or batch. Configure validation pages, warranty forms, and campaign experiences — all from one dashboard. Order professional printing or integrate with your existing production line."
[hiw_step2_title]
other = "Consumers Scan to Verify"
[hiw_step2_desc]
other = "Customers scan the QR code with any smartphone camera. Instantly, they see whether the product is authentic — complete with your branding, product details, and certification badges. No app download required."
[hiw_step3_title]
other = "Engage, Protect, Analyze"
[hiw_step3_desc]
other = "Each scan feeds real-time data into your dashboard: location heatmaps, counterfeit alerts, warranty registrations, and campaign participation. Suspicious patterns are flagged automatically so you can act fast."

# Features
[features_title]
other = "Everything You Need in One Platform"
[feat1_title]
other = "Product Authentication"
[feat1_desc]
other = "Your customers scan. Your brand speaks. Every QR code opens a fully branded verification page that tells consumers — in your colors, your logo, your voice — whether the product in their hands is real."

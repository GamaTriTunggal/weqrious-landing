# FAQ
[faq_title]
other = "Frequently Asked Questions"
[faq1_q]
other = "How quickly can we deploy WEQRIOUS for our products?"
[faq1_a]
other = "Most brands go live within a week. Sign up, create your products, generate QR codes, and print. No hardware installation or app development required — consumers scan with any smartphone camera."
[faq2_q]
other = "Is the platform customizable to match our brand identity?"
[faq2_a]
other = "Fully. Every consumer-facing page — validation, warranty, campaign — is white-labeled with your logo, colors, and imagery. You can create multiple templates and schedule seasonal themes."
[faq3_q]
other = "How does counterfeit detection work without specialized hardware?"
[faq3_a]
other = "WEQRIOUS uses intelligent software-based detection. Each QR code is unique and tracked. The system flags anomalies like excessive scans, impossible-travel patterns (same code scanned in two distant cities within minutes), and products appearing outside their authorized distribution zones."
[faq4_q]
other = "Is our data secure?"
[faq4_a]
other = "Security is built into every layer. We use JWT-based authentication with HttpOnly cookies, tenant-isolated data architecture, full audit logging, and infrastructure hardened following industry best practices. Your data is never shared between tenants."


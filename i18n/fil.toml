[problems_title]
other = "Nakakasira ng Kita ang Peke. Hindi Sapat ang Passive Labels."
[problems_body1]
other = "Ang pandaigdigang pagpepeke ay nagdudulot ng mahigit sa $500 bilyong pagkalugi bawat taon sa anyo ng nawawalang kita, pinsala sa tatak, at panganib sa kaligtasan ng konsyumer. Ang tradisyunal na hologram stickers at static QR codes ay hindi nagbibigay ng real-time na intelligence — walang impormasyon kung kailan lumitaw ang peke, saan ito na-scan, o sino ang nag-scan."
[problems_body2]
other = "Mas malala pa, ang bawat scan ng produkto ay isang napalampas na pagkakataon. Milyun-milyong konsyumer ang nakikipag-ugnayan sa inyong packaging araw-araw, ngunit karamihan sa mga tatak ay hindi nakakakalap ng anumang data mula sa mga sandaling iyon."
[problems_body3]
other = "<strong>Binabago ng WEQRIOUS ang pareho.</strong> Ginagawa naming verification event ang bawat scan, at engagement opportunity ang bawat verification — nagbibigay ng proteksyon at insight sa iisang platform."

[hiw_title]
other = "Tatlong Hakbang. Kumpletong Proteksyon."
[hiw_step1_title]
other = "Gumawa at Mag-print"
[hiw_step1_desc]
other = "Lumikha ng natatanging QR codes para sa bawat product unit o batch. I-configure ang validation pages, warranty forms, at campaign experiences — lahat mula sa isang dashboard. Umorder ng propesyonal na printing o i-integrate sa inyong kasalukuyang production line."
[hiw_step2_title]
other = "Nag-scan ang Konsyumer para Mag-verify"
[hiw_step2_desc]
other = "Nag-scan ang customer ng QR code gamit ang smartphone camera. Kaagad, makikita nila kung tunay ang produkto — kumpleto ang inyong branding, detalye ng produkto, at certification badges. Walang kailangang i-download na app."
[hiw_step3_title]
other = "Makiugnay, Magprotekta, Mag-analisa"
[hiw_step3_desc]
other = "Ang bawat scan ay nagpapadala ng real-time data sa inyong dashboard: location heatmaps, counterfeit alerts, warranty registrations, at campaign participation. Ang mga kahinahinalang pattern ay awtomatikong na-flag upang makapagkilos kayo nang mabilis."

[features_title]
other = "Lahat ng Kailangan Ninyo sa Isang Platform"
[feat1_title]
other = "Authentikasyon ng Produkto"
[feat1_desc]
other = "Nag-scan ang inyong customer. Nagsasalita ang inyong tatak. Ang bawat QR code ay nagbubukas ng verification page na puno ng inyong branding — sa inyong mga kulay, logo, at tono — at nagsasabi sa konsyumer kung tunay ba ang produktong hawak nila."
[feat2_title]
other = "Pagtuklas ng Peke"
[feat2_desc]
other = "Hindi naghahayag ng sarili ang peke. Nahahanap sila ng aming sistema — sa pamamagitan ng scan pattern analysis, geographic anomaly detection, at pagsubaybay sa distribution zones. Makakatanggap kayo ng alerto bago kumalat ang pinsala."
[feat3_title]
other = "Mga Campaign at Consumer Engagement"
[feat3_desc]
other = "Karamihan sa mga tatak ay nawawalan ng customer sa sandaling mabili nila ang produkto. Sa WEQRIOUS, ang bawat scan ay pagkakataon na magpatakbo ng promo, mangalap ng feedback, at magtayo ng loyalty — ginagawang pinaka-gamit na marketing channel ang inyong packaging."
[feat4_title]
other = "Pamamahala ng Warranty"
[feat4_desc]
other = "Nagrerehistro ng warranty ang konsyumer sa pamamagitan ng pag-scan. Dumadaan ang mga claim sa isang structured workflow na kontrolado ng inyong team. Wala nang spreadsheet, wala nang nawawalang papel — malinis na proseso mula sa registration hanggang resolution."
[feat5_title]
other = "Pagsubaybay ng Distribusyon"
[feat5_desc]
other = "Alamin nang eksakto kung nasaan ang inyong mga produkto — at kung saan hindi sila dapat. Subaybayan ang inventory sa bawat tier ng distribution network, at makakatanggap kayo ng alerto kapag lumitaw ang produkto sa labas ng authorized na teritoryo."
[feat6_title]
other = "Analytics at Insights"
[feat6_desc]
other = "Ang bawat scan ay isang data point. Tingnan kung nasaan ang inyong konsyumer, paano sila nakikipag-ugnayan, at kung saan lumalabas ang mga banta — lahat sa isang dashboard na may real-time heatmaps at trend analysis."


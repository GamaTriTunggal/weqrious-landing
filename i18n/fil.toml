[faq_title]
other = "Madalas Itanong"
[faq1_q]
other = "Gaano kabilis namin madedeploy ang WEQRIOUS para sa aming mga produkto?"
[faq1_a]
other = "Karamihan sa mga tatak ay nag-go live sa loob ng isang linggo. Mag-sign up, gumawa ng inyong mga produkto, mag-generate ng QR codes, at mag-print. Walang hardware installation o app development na kailangan — nag-scan ang konsyumer gamit ang kahit anong smartphone camera."
[faq2_q]
other = "Maaari bang i-customize ang platform upang tumugma sa identity ng aming tatak?"
[faq2_a]
other = "Ganap. Ang bawat consumer-facing page — validation, warranty, campaign — ay white-labeled ng inyong logo, kulay, at imahe. Maaari kayong gumawa ng maraming templates at magtakda ng seasonal themes."
[faq3_q]
other = "Paano gumagana ang counterfeit detection nang walang specialized na hardware?"
[faq3_a]
other = "Gumagamit ang WEQRIOUS ng matalinong software-based detection. Bawat QR code ay natatangi at nasusubaybayan. Ini-flag ng sistema ang mga anomalya tulad ng sobrang scan, impossible-travel patterns (ang parehong code na na-scan sa dalawang malalayong lungsod sa ilang minuto), at mga produktong lumalabas sa labas ng authorized distribution zone."
[faq4_q]
other = "Ligtas ba ang aming data?"
[faq4_a]
other = "Nakabaon ang seguridad sa bawat layer. Gumagamit kami ng JWT-based authentication na may HttpOnly cookies, tenant-isolated data architecture, kumpletong audit logging, at infrastructure na pinatatag ayon sa industry best practices. Hindi ibinabahagi ang inyong data sa pagitan ng mga tenant."


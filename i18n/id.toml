[problems_title]
other = "Pemalsuan Menghancurkan Pendapatan. Label Pasif Tidak Cukup."
[problems_body1]
other = "Pemalsuan global merugikan perusahaan lebih dari $500 miliar setiap tahun dalam bentuk kehilangan pendapatan, kerusakan reputasi merek, dan risiko keselamatan konsumen. Stiker hologram tradisional dan kode QR statis tidak memberikan intelijen real-time — tidak ada informasi kapan barang palsu muncul, di mana dipindai, atau siapa yang memindai."
[problems_body2]
other = "Lebih buruk lagi, setiap pemindaian produk adalah peluang yang terlewat. Jutaan konsumen berinteraksi dengan kemasan Anda setiap hari, namun sebagian besar merek tidak memperoleh data dari momen-momen tersebut."
[problems_body3]
other = "<strong>WEQRIOUS mengubah keduanya.</strong> Kami mengubah setiap pemindaian menjadi peristiwa verifikasi, dan setiap verifikasi menjadi peluang keterlibatan — memberikan Anda perlindungan dan wawasan dalam satu platform."

[hiw_title]
other = "Tiga Langkah. Perlindungan Menyeluruh."
[hiw_step1_title]
other = "Hasilkan & Cetak"
[hiw_step1_desc]
other = "Buat kode QR unik untuk setiap unit atau batch produk. Konfigurasikan halaman validasi, formulir garansi, dan pengalaman kampanye — semua dari satu dasbor. Pesan pencetakan profesional atau integrasikan dengan lini produksi yang telah Anda miliki."
[hiw_step2_title]
other = "Konsumen Memindai untuk Verifikasi"
[hiw_step2_desc]
other = "Pelanggan memindai kode QR dengan kamera ponsel. Seketika, mereka mengetahui apakah produk tersebut asli — lengkap dengan branding, detail produk, dan lencana sertifikasi Anda. Tidak memerlukan unduhan aplikasi."
[hiw_step3_title]
other = "Terlibat, Lindungi, Analisis"
[hiw_step3_desc]
other = "Setiap pemindaian mengalirkan data real-time ke dasbor Anda: heatmap lokasi, peringatan pemalsuan, pendaftaran garansi, dan partisipasi kampanye. Pola mencurigakan ditandai secara otomatis agar Anda dapat bertindak cepat."

[features_title]
other = "Semua yang Anda Perlukan dalam Satu Platform"
[feat1_title]
other = "Otentikasi Produk"
[feat1_desc]
other = "Pelanggan Anda memindai. Merek Anda berbicara. Setiap kode QR membuka halaman verifikasi yang sepenuhnya sesuai branding Anda — dengan warna, logo, dan tonasi Anda — dan memberi tahu konsumen apakah produk yang mereka pegang benar-benar asli."
[feat2_title]
other = "Deteksi Pemalsuan"
[feat2_desc]
other = "Barang palsu tidak memperkenalkan diri. Sistem kami tetap menemukannya — melalui analisis pola pemindaian, deteksi anomali geografis, dan pemantauan zona distribusi. Anda memperoleh peringatan sebelum kerugian menyebar."
[feat3_title]
other = "Kampanye & Keterlibatan Konsumen"
[feat3_desc]
other = "Sebagian besar merek kehilangan pelanggannya sesaat setelah pembelian. Dengan WEQRIOUS, setiap pemindaian adalah kesempatan untuk menjalankan promosi, mengumpulkan umpan balik, dan membangun loyalitas — menjadikan kemasan sebagai kanal pemasaran yang paling kurang dimanfaatkan."
[feat4_title]
other = "Manajemen Garansi"
[feat4_desc]
other = "Konsumen mendaftarkan garansi dengan memindai. Klaim mengalir melalui alur kerja terstruktur yang dikendalikan tim Anda. Tidak lagi spreadsheet, tidak lagi dokumen hilang — proses bersih dari pendaftaran hingga penyelesaian."
[feat5_title]
other = "Pelacakan Distribusi"
[feat5_desc]
other = "Ketahui persis di mana produk Anda berada — dan di mana seharusnya tidak berada. Lacak inventaris di setiap tingkatan jaringan distribusi, dan dapatkan peringatan ketika produk muncul di luar wilayah yang diizinkan."
[feat6_title]
other = "Analitik & Wawasan"
[feat6_desc]
other = "Setiap pemindaian adalah titik data. Lihat di mana konsumen Anda berada, bagaimana mereka berinteraksi, dan di mana ancaman muncul — semua dalam satu dasbor dengan heatmap real-time dan analisis tren."


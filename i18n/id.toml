[faq_title]
other = "Pertanyaan yang Sering Diajukan"
[faq1_q]
other = "Seberapa cepat kami dapat menerapkan WEQRIOUS untuk produk kami?"
[faq1_a]
other = "Sebagian besar merek tayang dalam waktu satu minggu. Daftar, buat produk Anda, hasilkan kode QR, dan cetak. Tidak memerlukan pemasangan perangkat keras atau pengembangan aplikasi — konsumen memindai dengan kamera ponsel apa pun."
[faq2_q]
other = "Apakah platform ini dapat dikustomisasi sesuai identitas merek kami?"
[faq2_a]
other = "Sepenuhnya. Setiap halaman yang dihadap konsumen — validasi, garansi, kampanye — ditampilkan dengan label putih menggunakan logo, warna, dan visual Anda. Anda dapat membuat banyak template dan menjadwalkan tema musiman."
[faq3_q]
other = "Bagaimana deteksi pemalsuan bekerja tanpa perangkat keras khusus?"
[faq3_a]
other = "WEQRIOUS menggunakan deteksi cerdas berbasis perangkat lunak. Setiap kode QR unik dan dilacak. Sistem menandai anomali seperti pemindaian berlebih, pola perjalanan mustahil (kode yang sama dipindai di dua kota yang berjauhan dalam hitungan menit), dan produk yang muncul di luar zona distribusi resmi."
[faq4_q]
other = "Apakah data kami aman?"
[faq4_a]
other = "Keamanan dibangun di setiap lapisan. Kami menggunakan otentikasi berbasis JWT dengan cookie HttpOnly, arsitektur data dengan isolasi antar tenant, pencatatan audit lengkap, dan infrastruktur yang diperketat mengikuti praktik terbaik industri. Data Anda tidak pernah dibagikan antar tenant."


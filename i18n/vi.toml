[problems_title]
other = "Hàng Giả Giết Chết Doanh Thu. Nhãn Thụ Động Không Giúp Ích."
[problems_body1]
other = "Hàng giả trên toàn cầu gây thiệt hại cho doanh nghiệp hơn 500 tỷ đô la mỗi năm thông qua doanh thu thất thoát, tổn hại thương hiệu, và rủi ro an toàn người tiêu dùng. Nhãn hologram truyền thống và mã QR tĩnh không cung cấp thông tin theo thời gian thực — không cho biết khi nào hàng giả xuất hiện, được quét ở đâu, hay ai đã quét."
[problems_body2]
other = "Tệ hơn nữa, mỗi lần quét sản phẩm là một cơ hội bị bỏ lỡ. Hàng triệu người tiêu dùng tương tác với bao bì của bạn mỗi ngày, nhưng hầu hết các thương hiệu không thu thập được bất kỳ dữ liệu nào từ những khoảnh khắc đó."
[problems_body3]
other = "<strong>WEQRIOUS thay đổi cả hai.</strong> Chúng tôi biến mỗi lần quét thành sự kiện xác thực và mỗi lần xác thực thành cơ hội tương tác — mang đến cho bạn khả năng bảo vệ và thấu hiểu trên một nền tảng duy nhất."

[hiw_title]
other = "Ba Bước. Bảo Vệ Toàn Diện."
[hiw_step1_title]
other = "Tạo & In"
[hiw_step1_desc]
other = "Tạo mã QR duy nhất cho mỗi đơn vị sản phẩm hoặc lô hàng. Cấu hình trang xác minh, biểu mẫu bảo hành và trải nghiệm chiến dịch — tất cả trên một bảng điều khiển. Đặt in ấn chuyên nghiệp hoặc tích hợp với dây chuyền sản xuất hiện có của bạn."
[hiw_step2_title]
other = "Người Tiêu Dùng Quét để Xác Minh"
[hiw_step2_desc]
other = "Khách hàng quét mã QR bằng camera điện thoại. Ngay lập tức, họ biết sản phẩm có phải là chính hãng — cùng với thương hiệu, thông tin sản phẩm và huy hiệu chứng nhận của bạn. Không cần tải ứng dụng."
[hiw_step3_title]
other = "Tương Tác, Bảo Vệ, Phân Tích"
[hiw_step3_desc]
other = "Mỗi lần quét cung cấp dữ liệu theo thời gian thực vào bảng điều khiển của bạn: bản đồ nhiệt vị trí, cảnh báo hàng giả, đăng ký bảo hành và mức tham gia chiến dịch. Các mẫu đáng ngờ được gắn cờ tự động để bạn có thể hành động nhanh chóng."

[features_title]
other = "Tất Cả Những Gì Bạn Cần Trên Một Nền Tảng"
[feat1_title]
other = "Xác Thực Sản Phẩm"
[feat1_desc]
other = "Khách hàng của bạn quét. Thương hiệu của bạn lên tiếng. Mỗi mã QR mở ra một trang xác minh được gắn thương hiệu đầy đủ — với màu sắc, logo và tiếng nói của bạn — cho người tiêu dùng biết sản phẩm họ đang cầm có thật hay không."
[feat2_title]
other = "Phát Hiện Hàng Giả"
[feat2_desc]
other = "Hàng giả không tự giới thiệu. Hệ thống của chúng tôi vẫn phát hiện ra chúng — thông qua phân tích mẫu quét, phát hiện bất thường địa lý và giám sát vùng phân phối. Bạn nhận cảnh báo trước khi thiệt hại lan rộng."
[feat3_title]
other = "Chiến Dịch & Tương Tác Người Tiêu Dùng"
[feat3_desc]
other = "Hầu hết các thương hiệu mất khách hàng ngay khi họ mua. Với WEQRIOUS, mỗi lần quét là cơ hội để chạy khuyến mại, thu thập phản hồi và xây dựng lòng trung thành — biến bao bì thành kênh tiếp thị ít được sử dụng nhất của bạn."
[feat4_title]
other = "Quản Lý Bảo Hành"
[feat4_desc]
other = "Người tiêu dùng đăng ký bảo hành bằng cách quét. Khiếu nại chảy qua quy trình làm việc có cấu trúc mà đội ngũ của bạn kiểm soát. Không còn bảng tính, không còn giấy tờ thất lạc — chỉ là một quy trình sạch từ đăng ký đến giải quyết."
[feat5_title]
other = "Theo Dõi Phân Phối"
[feat5_desc]
other = "Biết chính xác sản phẩm của bạn đang ở đâu — và ở đâu thì không nên có. Theo dõi hàng tồn kho trên mọi cấp độ của mạng lưới phân phối và nhận cảnh báo khi sản phẩm xuất hiện ngoài lãnh thổ được ủy quyền."
[feat6_title]
other = "Phân Tích & Thông Tin Chuyên Sâu"
[feat6_desc]
other = "Mỗi lần quét là một điểm dữ liệu. Xem người tiêu dùng của bạn ở đâu, họ tương tác như thế nào và các mối đe dọa đang nổi lên ở đâu — tất cả trên một bảng điều khiển với bản đồ nhiệt theo thời gian thực và phân tích xu hướng."


[faq_title]
other = "Câu Hỏi Thường Gặp"
[faq1_q]
other = "Chúng tôi có thể triển khai WEQRIOUS cho sản phẩm của mình nhanh như thế nào?"
[faq1_a]
other = "Hầu hết các thương hiệu đi vào hoạt động trong vòng một tuần. Đăng ký, tạo sản phẩm của bạn, tạo mã QR, và in. Không cần cài đặt phần cứng hay phát triển ứng dụng — người tiêu dùng quét bằng bất kỳ camera điện thoại nào."
[faq2_q]
other = "Nền tảng có thể tùy chỉnh theo nhận diện thương hiệu của chúng tôi không?"
[faq2_a]
other = "Hoàn toàn có thể. Mọi trang hướng tới người tiêu dùng — xác minh, bảo hành, chiến dịch — đều được gắn nhãn trắng với logo, màu sắc và hình ảnh của bạn. Bạn có thể tạo nhiều mẫu và lên lịch chủ đề theo mùa."
[faq3_q]
other = "Việc phát hiện hàng giả hoạt động như thế nào mà không cần phần cứng chuyên dụng?"
[faq3_a]
other = "WEQRIOUS sử dụng phát hiện thông minh dựa trên phần mềm. Mỗi mã QR là duy nhất và được theo dõi. Hệ thống gắn cờ các bất thường như quét quá mức, mẫu di chuyển bất khả thi (cùng một mã được quét ở hai thành phố cách xa nhau trong vài phút) và các sản phẩm xuất hiện ngoài vùng phân phối được ủy quyền."
[faq4_q]
other = "Dữ liệu của chúng tôi có an toàn không?"
[faq4_a]
other = "An ninh được tích hợp trong mọi lớp. Chúng tôi sử dụng xác thực dựa trên JWT với cookie HttpOnly, kiến trúc dữ liệu cô lập theo tenant, ghi nhật ký kiểm toán đầy đủ, và hạ tầng được tăng cường theo các thực tiễn tốt nhất của ngành. Dữ liệu của bạn không bao giờ được chia sẻ giữa các tenant."


<section id="plans" class="section pricing">
    <div class="container">
        <h2 class="section-title">{{ i18n "pricing_title" }}</h2>
        <div class="pricing-grid">
            <div class="pricing-card">
                <div class="pricing-tier">{{ i18n "plan_basic_tier" }}</div>
                <div class="pricing-desc">{{ i18n "plan_basic_desc" }}</div>
            </div>
            <div class="pricing-card pro-card">
                <div class="pricing-tier">{{ i18n "plan_intermediate_tier" }}</div>
                <div class="pricing-desc">{{ i18n "plan_intermediate_desc" }}</div>
            </div>
            <div class="pricing-card">
                <div class="pricing-tier">{{ i18n "plan_pro_tier" }}</div>
                <div class="pricing-desc">{{ i18n "plan_pro_desc" }}</div>
            </div>
        </div>
        <div style="text-align: center; margin-top: var(--spacing-xl);">
            <a href="#contact" class="hero-cta" style="background-color: var(--color-primary-dark); color: white;">{{ i18n "hero_cta" }}</a>
        </div>
    </div>
</section>

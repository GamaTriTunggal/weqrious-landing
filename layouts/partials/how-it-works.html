<section id="how-it-works" class="section how-it-works">
    <div class="container">
        <h2 class="section-title">{{ i18n "hiw_title" }}</h2>
        <div class="steps" style="justify-content: center;">
            <div class="step">
                <div class="step-number">1</div>
                <h3>{{ i18n "hiw_step1_title" }}</h3>
                <p>{{ i18n "hiw_step1_desc" | safeHTML }}</p>
            </div>
            <div class="step-connector"></div>
            <div class="step">
                <div class="step-number">2</div>
                <h3>{{ i18n "hiw_step2_title" }}</h3>
                <p>{{ i18n "hiw_step2_desc" | safeHTML }}</p>
            </div>
            <div class="step-connector"></div>
            <div class="step">
                <div class="step-number">3</div>
                <h3>{{ i18n "hiw_step3_title" }}</h3>
                <p>{{ i18n "hiw_step3_desc" | safeHTML }}</p>
            </div>
        </div>
    </div>
</section>

{{- $currentLang := .Site.Language.Lang -}}
{{- $currentPage := . -}}
<div class="lang-switcher" id="langSwitcher">
    <button type="button" class="lang-switcher-toggle" id="langSwitcherToggle" aria-haspopup="true" aria-expanded="false">
        <svg class="lang-switcher-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20"/>
        </svg>
        <span class="lang-switcher-current">{{ .Site.Language.LanguageName }}</span>
        <svg class="lang-switcher-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <ul class="lang-switcher-menu" role="menu">
        {{- range .Sites -}}
        {{- $site := . -}}
        {{- with ($site.GetPage $currentPage.Path) -}}
        <li role="none">
            <a role="menuitem" href="{{ .RelPermalink }}"
               class="lang-switcher-item{{ if eq $site.Language.Lang $currentLang }} active{{ end }}"
               lang="{{ $site.Language.LanguageCode }}"
               data-lang="{{ $site.Language.Lang }}">
                {{ $site.Language.LanguageName }}
            </a>
        </li>
        {{- end -}}
        {{- end }}
    </ul>
</div>

<nav class="nav">
    <div class="theme-switcher" id="themeSwitcher">
        <button class="theme-option" data-theme="system" title="{{ i18n "theme_system" }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                <path d="M8 21h8M12 17v4"/>
            </svg>
        </button>
        <button class="theme-option" data-theme="light" title="{{ i18n "theme_light" }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
        </button>
        <button class="theme-option" data-theme="dark" title="{{ i18n "theme_dark" }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
        </button>
    </div>
    <div class="nav-brand">
        <img src="{{ "images/logo.png" | relURL }}" alt="{{ .Site.Params.brandName }} Logo" class="nav-logo">
        <span class="nav-title">{{ .Site.Params.brandNameUpper }}</span>
    </div>
    <div class="nav-right">
        {{ partial "lang-switcher.html" . }}
        <a href="{{ .Site.Params.loginUrl }}" class="nav-login">{{ i18n "nav_login" }}</a>
    </div>
</nav>
